<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

    <style>
        body{
            background: #215f00;
            color: white;
            background: linear-gradient(to right, #e4e4d9, #215f00);
        }

        body a{
            text-decoration: none;
            color:#4eald7
        }

        .parent {
            background-color:rgba(24, 33, 20, 0.2);
            width:25%;            
            border-radius:10px;
            margin:5% auto 0%;
            padding:30px 20px 30px 10px;
            text-align: center;
            font-family:sans-serif;
        }

        .parent div{
            margin:5% 0%;
        }

        .form-field input{
            padding:15px 10px;
            width:80%;          
            border: none;
            border-radius: 10px;
            background-color: rgba(162, 183, 153, 0.8);
        }

        .form-field input::placeholder{
            color: white;
        }

        .form-checkbox{
            display: flex;
            justify-content: space-between;
            align-items:center;
            width: 80%;
            padding:0px 10px;
            text-align:center;
            margin: auto!important;
        }

        .form-field button{
            border-radius: 15px;
            background-color: rgb(73, 73, 207);
            border: none;
            width:85%;
            color: white;
            padding:15px 20px;
        }

        .form-links{
            width: 85%;
            margin: auto!important;
            margin: 10% 0% !important;

            display: flex;         
            justify-content: center;
            gap: 15px;              
        }

        .form-links a{
            border: 1px solid black;
            padding: 10px 15px;
            margin: 0;             
            
            display: flex;         
            align-items: center;
            justify-content: center;
            gap: 8px;              
        }

    </style>
</head>

<body>
    <form class="parent">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>

        <div class="form-field">
            <input type="email" placeholder="Email  Address" />
        </div>

        <div class="form-field">
            <input type="password" placeholder="Password" />
        </div>

        <div class="form-checkbox">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label> 

            <a href="">Forget password?</a>
        </div>

        <div class="form-field">
            <button>Sign In</button>
        </div>

        <div class="form-field" style="margin-bottom: 20px;">
            Or continue with
        </div>

        <div class="form-links">
            <a href=""><i class="fa-brands fa-google"></i> Google</a>
            <a href=""><i class="fa-brands fa-github"></i> GitHub</a>
        </div>

        <div class="form-field">
            Dont have an account?
            <a href="">Sign Up </a>
        </div>
    </form>
</body>

</html>
