<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body {
      margin: 0%;
      font-family: sans-serif;
    }

    a {
      text-decoration: none;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5%;
    }

    .drop-downs {
      width: 60%;
      display: flex;
      justify-content: space-evenly;
    }

    .drop-downs select {
      border: none;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .navbar-links {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .navbar-links a {
      color: #002970;
      display: flex;
      align-items: center;
    }

    .sign-in {
      background-color: #002970;
      color: white !important;
      padding: 10px;
      border-radius: 25px;
    }

    .bank-account-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border-radius: 20px;
      margin:2% 6%;
      padding-left: 5%;
    }
    .Bank{
     width: 40%;  
    }
    .Bank img{
    width: 30%;  
    }
    .Bank p{
      font-size: 18px;
    }
    .right img{
      width:600px;
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <a href="">
      <img src="https://pwebassets.paytm.com/commonwebassets/paytmweb/header/images/logo_new.svg" alt="paytm logo" />
    </a>
    <div class="drop-downs">
      <select>
        <option value="">Recharge & Bill</option>
      </select>
      <select>
        <option value="">Ticket Booking</option>
      </select>
      <select>
        <option value="">Payments & Services</option>
      </select>
      <select>
        <option value="">Paytm for Business</option>
      </select>
      <select>
        <option value="">Company</option>
      </select>
    </div>
    <div class="navbar-links">
      <a href="">
        <i class="fa-solid fa-download"></i>
        Download App
      </a>
      <a href="" class="sign-in">
        <i class="fa-solid fa-user"></i>
        Sign-In
      </a>
    </div>
  </nav>
  <div class="bank-account-container">
    <div class="Bank">
      <a href="">
        <img src="https://assetscdn1.paytm.com/images/catalog/view/342367/1725447383123.png" alt="" />
      </a>
      <h1>Pay anyone directly<br>
        from your bank<br>
        account</h1>
      <p>
        Pay anyone, everywhere. Make contactless & secure<br>
         payments in-stores or online using Paytm UPI or<br>
         Directly from your Bank Account. Plus, send &<br>
         receive money from anyone.
      </p>
      <a href="">
        <img src="https://assetscdn1.paytm.com/images/catalog/view_item/2834703/1725432129171.png" alt="" />
      </a>
      <a href="">
        <img src="https://assetscdn1.paytm.com/images/catalog/view_item/2834704/1725432148873.png" alt="" />
      </a>
    </div>
    <div class="right">
      <a href="">
        <img src="https://assetscdn1.paytm.com/images/catalog/view/1752741641420.png" alt=""/>
      </a>
    </div>
</body>

</html>
