<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: green;
            width:40%;
            height:300px;
            display:flex;
            justify-content: center;
            align-items: center;
        }
        .p{
            background-color:black;
            color:white;
            padding:20px;
            transition: transform 0.8s linear;
        }
        p:hover{
            transform:translate(30px);
            /* transform:scale(2.3);
            transform:skew(45deg,50deg);
            transform:rotate(-360deg) */
        }
        .ball{
           background-color: cornflowerblue;
           width: 80px;
           height: 80px;
           color: black;
           border-radius: 50%;
           animation: bonus 1.5s ease infinite;
            position:absolute ;
            display:flex;
            justify-content: center;
            align-items: center;
        }
        @keyframes bonus {
            0%{
                top:0px
            }
            5%{
                top:180px;
                transform:translate(50px) rotate(180deg) scale(1.4);
            }
            100%{
                top:0px
            }
        }

    </style>
</head>
<body>
    <!-- <div class="container">
        <p>Helloo</p>
    </div> -->
    <div class="ball">harini</div>
</body>
</html>
